version: '3.8'

services:
  app:
    build: .                    # Build using our Dockerfile
    container_name: task-api
    ports:
      - "3000:3000"            # host:container
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"               # Nginx listens on port 80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: unless-stopped